<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>openassay Custom Functions</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <!--
    This page is loaded by the Custom Functions runtime (hidden, no UI).
    It initialises the WASM engine and registers OPENASSAY.SQL().
  -->
  <script type="module">
    import init, { execute_sql_json, register_fdw } from './pkg/openassay.js';

    let wasmReady = false;
    let fdwReady = false;
    let excelServerReady = false;
    let inputTableRegistered = false;
    let inputTableSignature = null;

    const fdwCache = new Map();

    // ── helpers ────────────────────────────────────────────────────────

    function quoteIdent(name) {
      return `"${String(name).replace(/"/g, '""')}"`;
    }

    function quoteLiteral(value) {
      return `'${String(value).replace(/'/g, "''")}'`;
    }

    function normalizeHeader(header, index) {
      if (header === null || header === undefined || header === '') {
        return `col_${index + 1}`;
      }
      return String(header);
    }

    function toFdwCell(value) {
      if (value === null || value === undefined) {
        return null;
      }
      return String(value);
    }

    function inferColumnTypes(headers, rows) {
      return headers.map((_, colIdx) => {
        for (const row of rows.slice(0, 10)) {
          const value = row[colIdx];
          if (value === null || value === undefined) {
            continue;
          }
          if (typeof value === 'number') {
            return Number.isInteger(value) ? 'BIGINT' : 'DOUBLE PRECISION';
          }
          if (typeof value === 'boolean') {
            return 'BOOLEAN';
          }
        }
        return 'TEXT';
      });
    }

    function buildMatrixDefinition(matrix) {
      if (!Array.isArray(matrix) || matrix.length === 0) {
        throw new Error('Need at least a header row');
      }

      const headers = (matrix[0] || []).map((header, index) =>
        normalizeHeader(header, index)
      );
      if (headers.length === 0) {
        throw new Error('Need at least one column in the header row');
      }

      const rows = matrix.slice(1);
      const types = inferColumnTypes(headers, rows);
      return {
        headers,
        rows,
        types,
        signature: JSON.stringify({ headers, types }),
      };
    }

    function registerExcelFdw() {
      if (fdwReady) {
        return;
      }
      register_fdw('excel', (_tableName, optionsJson) => {
        const options = JSON.parse(optionsJson || '{}');
        const cacheKey = options.cache_key ?? options.sheet ?? 'input';
        return fdwCache.get(cacheKey) ?? [];
      });
      fdwReady = true;
    }

    async function runSQL(sql) {
      if (!wasmReady) throw new Error('WASM engine not ready');
      const json = await execute_sql_json(sql);
      return JSON.parse(json);
    }

    async function ensureExcelServer() {
      if (excelServerReady) {
        return;
      }
      await runSQL('CREATE SERVER IF NOT EXISTS excel_server FOREIGN DATA WRAPPER excel');
      excelServerReady = true;
    }

    async function ensureInputForeignTable(matrix) {
      const definition = buildMatrixDefinition(matrix);

      fdwCache.set(
        'input',
        definition.rows.map(row =>
          definition.headers.map((_, columnIndex) => toFdwCell(row[columnIndex]))
        )
      );

      await ensureExcelServer();

      if (inputTableRegistered && inputTableSignature === definition.signature) {
        return;
      }

      if (inputTableRegistered) {
        await runSQL(`DROP TABLE IF EXISTS ${quoteIdent('input')}`);
      }

      const columnDefs = definition.headers
        .map((header, index) => `${quoteIdent(header)} ${definition.types[index]}`)
        .join(', ');

      await runSQL(
        `CREATE FOREIGN TABLE IF NOT EXISTS ${quoteIdent('input')} (${columnDefs}) ` +
        `SERVER excel_server OPTIONS (cache_key ${quoteLiteral('input')})`
      );

      inputTableRegistered = true;
      inputTableSignature = definition.signature;
    }

    // ── Custom Function: OPENASSAY.SQL ─────────────────────────────────

    /**
     * =OPENASSAY.SQL(query, [data])
     *
     * Runs a PostgreSQL query via the WASM engine and returns a dynamic
     * array (spill) including a header row.
     *
     * If `data` is provided (a cell range), it is imported as the table
     * named "input" before the query runs.
     */
    async function sql(query, data) {
      if (!wasmReady) throw new Error('Engine still loading -- try again in a moment.');

      // If a data range was passed, expose it as the FDW-backed "input" table.
      if (data && Array.isArray(data) && data.length > 0) {
        await ensureInputForeignTable(data);
      }

      const result = await runSQL(query);

      if (result.error) throw new Error(result.error);

      // Support both flat and nested result formats
      let res = result;
      if (result.results && result.results.length > 0) {
        res = result.results.slice().reverse().find(r => r.columns && r.columns.length > 0)
              || result.results[result.results.length - 1];
      }

      const columns = res.columns || [];
      const rows    = res.rows    || [];

      if (columns.length === 0) return [['(no results)']];

      // Return header + data as a 2-D array (spill)
      return [columns, ...rows.map(row => row.map(value => (value === null ? null : value)))];
    }

    // ── Registration ───────────────────────────────────────────────────

    Office.onReady(async () => {
      await init();
      registerExcelFdw();
      wasmReady = true;
      CustomFunctions.associate('SQL', sql);
    });
  </script>
</body>
</html>
