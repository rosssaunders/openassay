<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openassay SQL</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      background: #f5f5f5;
      color: #333;
      font-size: 13px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #0078d4;
    }
    .section { margin-bottom: 12px; }
    .section label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 12px;
      color: #666;
    }
    select, input, button {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    select { background: white; }
    button {
      background: #0078d4;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 8px;
      margin-top: 4px;
    }
    button:hover { background: #106ebe; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary {
      background: #e0e0e0;
      color: #333;
    }
    button.secondary:hover { background: #d0d0d0; }
    #sql-input {
      width: 100%;
      height: 120px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    #status {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      min-height: 16px;
    }
    #status.error { color: #d32f2f; }
    #status.success { color: #2e7d32; }
    #results {
      margin-top: 8px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th {
      background: #0078d4;
      color: white;
      padding: 4px 8px;
      text-align: left;
      font-weight: 600;
    }
    td {
      padding: 4px 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    tr:nth-child(even) { background: #f9f9f9; }
    .tables-list {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .tables-list span {
      background: #e8f0fe;
      padding: 2px 6px;
      border-radius: 3px;
      margin: 2px;
      display: inline-block;
      color: #0078d4;
    }
    .row-count { color: #999; font-size: 11px; }
  </style>
</head>
<body>
  <h1>🐘 openassay SQL</h1>
  <p style="font-size:11px;color:#888;margin-bottom:12px;">
    Run PostgreSQL queries over your Excel data
  </p>

  <div class="section">
    <label>🔍 SQL Query</label>
    <textarea id="sql-input" placeholder="SELECT * FROM sheet1 WHERE amount > 100&#10;&#10;-- Sheets are auto-imported as tables"></textarea>
    <button id="btn-run">▶ Run Query</button>
    <button id="btn-to-sheet" class="secondary" style="margin-top:4px;" disabled>📋 Results → New Sheet</button>
  </div>
  <div id="imported-tables" class="tables-list"></div>

  <div id="status"></div>
  <div id="results"></div>

  <script type="module">
    import init, { execute_sql_json, register_fdw } from './pkg/openassay.js';

    let wasmReady = false;
    let fdwReady = false;
    let excelServerReady = false;
    let lastResult = null;
    const importedTables = new Map(); // sheet name -> {columns, rowCount}
    const registeredTables = new Map(); // sheet name -> {signature}
    const sheetDataCache = new Map(); // sheet name -> string[][]

    // Status helpers
    const status = document.getElementById('status');
    const setStatus = (msg, type = '') => {
      status.textContent = msg;
      status.className = type;
    };

    function quoteIdent(name) {
      return `"${String(name).replace(/"/g, '""')}"`;
    }

    function quoteLiteral(value) {
      return `'${String(value).replace(/'/g, "''")}'`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeHeader(header, index) {
      if (header === null || header === undefined || header === '') {
        return `col_${index + 1}`;
      }
      return String(header);
    }

    function toFdwCell(value) {
      if (value === null || value === undefined) {
        return null;
      }
      return String(value);
    }

    function inferColumnTypes(headers, rows) {
      return headers.map((_, colIdx) => {
        for (const row of rows.slice(0, 10)) {
          const value = row[colIdx];
          if (value === null || value === undefined) {
            continue;
          }
          if (typeof value === 'number') {
            return Number.isInteger(value) ? 'BIGINT' : 'DOUBLE PRECISION';
          }
          if (typeof value === 'boolean') {
            return 'BOOLEAN';
          }
          if (value instanceof Date) {
            return 'TIMESTAMP';
          }
        }
        return 'TEXT';
      });
    }

    function buildSheetDefinition(sheetName, values) {
      if (!Array.isArray(values) || values.length === 0) {
        return null;
      }

      const hasAnyContent = values.some(row =>
        Array.isArray(row) && row.some(cell => cell !== null && cell !== undefined && cell !== '')
      );
      if (!hasAnyContent) {
        return null;
      }

      const headers = (values[0] || []).map((header, index) =>
        normalizeHeader(header, index)
      );
      if (headers.length === 0) {
        return null;
      }

      const rows = values.slice(1);
      const types = inferColumnTypes(headers, rows);
      return {
        tableName: sheetName,
        headers,
        rows,
        types,
        signature: JSON.stringify({ headers, types }),
      };
    }

    function cacheRows(cacheKey, definition) {
      sheetDataCache.set(
        cacheKey,
        definition.rows.map(row =>
          definition.headers.map((_, columnIndex) => toFdwCell(row[columnIndex]))
        )
      );
    }

    function registerExcelFdw() {
      if (fdwReady) {
        return;
      }
      register_fdw('excel', (_tableName, optionsJson) => {
        const options = JSON.parse(optionsJson || '{}');
        const cacheKey = options.cache_key ?? options.sheet ?? '';
        return sheetDataCache.get(cacheKey) ?? [];
      });
      fdwReady = true;
    }

    async function ensureExcelServer() {
      if (excelServerReady) {
        return;
      }
      await runSQL('CREATE SERVER IF NOT EXISTS excel_server FOREIGN DATA WRAPPER excel');
      excelServerReady = true;
    }

    // Initialize WASM
    async function initWasm() {
      setStatus('Loading SQL engine...');
      try {
        await init();
        registerExcelFdw();
        wasmReady = true;
        setStatus('SQL engine ready ✓', 'success');
      } catch (err) {
        setStatus(`Failed to load engine: ${err.message}`, 'error');
      }
    }

    // Run SQL via WASM
    async function runSQL(sql) {
      if (!wasmReady) throw new Error('Engine not ready');
      const resultJson = await execute_sql_json(sql);
      return JSON.parse(resultJson);
    }

    async function ensureForeignTable(definition) {
      await ensureExcelServer();

      const existing = registeredTables.get(definition.tableName);
      if (existing && existing.signature === definition.signature) {
        importedTables.set(definition.tableName, {
          columns: definition.headers,
          rowCount: definition.rows.length,
        });
        return;
      }

      if (existing) {
        await runSQL(`DROP TABLE IF EXISTS ${quoteIdent(definition.tableName)}`);
      }

      const columnDefs = definition.headers
        .map((header, index) => `${quoteIdent(header)} ${definition.types[index]}`)
        .join(', ');

      await runSQL(
        `CREATE FOREIGN TABLE IF NOT EXISTS ${quoteIdent(definition.tableName)} (${columnDefs}) ` +
        `SERVER excel_server OPTIONS (` +
        `sheet ${quoteLiteral(definition.tableName)}, ` +
        `cache_key ${quoteLiteral(definition.tableName)}` +
        ')'
      );

      registeredTables.set(definition.tableName, { signature: definition.signature });
      importedTables.set(definition.tableName, {
        columns: definition.headers,
        rowCount: definition.rows.length,
      });
    }

    function updateTablesList() {
      const el = document.getElementById('imported-tables');
      if (importedTables.size === 0) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = Array.from(importedTables.entries())
        .map(([name, info]) =>
          `<span>${escapeHtml(quoteIdent(name))} <span class="row-count">(${info.rowCount} rows)</span></span>`
        )
        .join(' ');
    }

    async function autoRegisterSheets() {
      const definitions = [];
      importedTables.clear();
      sheetDataCache.clear();

      await Excel.run(async (context) => {
        const sheets = context.workbook.worksheets;
        sheets.load('items/name');
        await context.sync();

        const sheetRanges = sheets.items.map(sheet => {
          const range = sheet.getUsedRange();
          range.load('values');
          return { sheet, range };
        });

        await context.sync();

        for (const { sheet, range } of sheetRanges) {
          const definition = buildSheetDefinition(sheet.name, range.values);
          if (!definition) {
            continue;
          }
          cacheRows(definition.tableName, definition);
          definitions.push(definition);
        }
      });

      for (const definition of definitions) {
        await ensureForeignTable(definition);
      }

      updateTablesList();
    }

    // Run query
    document.getElementById('btn-run').addEventListener('click', async () => {
      const sql = document.getElementById('sql-input').value.trim();
      if (!sql) return;

      try {
        setStatus('Registering sheets...');
        await autoRegisterSheets();
        setStatus('Running query...');
        const t0 = performance.now();
        const result = await runSQL(sql);
        const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
        if (result.error) {
          setStatus(`Error: ${result.error}`, 'error');
          document.getElementById('results').innerHTML = '';
          return;
        }

        // Support both flat and nested result formats; for multi-statement, use last result with rows
        let firstResult = result;
        if (result.results && result.results.length > 0) {
          // Prefer last result that has columns (SELECT), otherwise last result
          firstResult = result.results.slice().reverse().find(r => r.columns && r.columns.length > 0) || result.results[result.results.length - 1];
        }
        lastResult = firstResult;
        const rows = firstResult.rows || [];
        const columns = firstResult.columns || [];

        setStatus(
          `${rows.length} row${rows.length !== 1 ? 's' : ''} · ${elapsed}s · ${firstResult.command_tag || result.command_tag || 'OK'}`,
          'success'
        );

        if (columns.length === 0) {
          document.getElementById('results').innerHTML = '<p style="color:#666">No results</p>';
          document.getElementById('btn-to-sheet').disabled = true;
          return;
        }

        // Render table
        let html = '<table><thead><tr>';
        html += columns.map(column => `<th>${escapeHtml(column)}</th>`).join('');
        html += '</tr></thead><tbody>';
        for (const row of rows.slice(0, 500)) {
          html += '<tr>';
          html += row.map(value =>
            `<td>${value === null ? '<i style="color:#999">NULL</i>' : escapeHtml(value)}</td>`
          ).join('');
          html += '</tr>';
        }
        if (rows.length > 500) {
          html += `<tr><td colspan="${columns.length}" style="text-align:center;color:#999">... ${rows.length - 500} more rows</td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('results').innerHTML = html;
        document.getElementById('btn-to-sheet').disabled = false;

      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    });

    // Export results to new sheet
    document.getElementById('btn-to-sheet').addEventListener('click', async () => {
      if (!lastResult || !lastResult.rows) return;
      try {
        setStatus('Writing to new sheet...');
        await Excel.run(async (context) => {
          const sheet = context.workbook.worksheets.add('Query Results');
          const columns = lastResult.columns;
          const rows = lastResult.rows;

          // Write headers
          const headerRange = sheet.getRangeByIndexes(0, 0, 1, columns.length);
          headerRange.values = [columns];
          headerRange.format.font.bold = true;

          // Write data
          if (rows.length > 0) {
            const dataRange = sheet.getRangeByIndexes(1, 0, rows.length, columns.length);
            dataRange.values = rows.map(row =>
              row.map(value => (value === null ? null : value))
            );
          }

          sheet.getUsedRange().format.autofitColumns();
          sheet.activate();
          await context.sync();
          setStatus(`Exported ${rows.length} rows to "Query Results" ✓`, 'success');
        });
      } catch (err) {
        setStatus(`Export error: ${err.message}`, 'error');
      }
    });

    // Ctrl+Enter to run
    document.getElementById('sql-input').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('btn-run').click();
      }
    });

    // Initialize
    Office.onReady(async () => {
      await initWasm();
    });
  </script>
</body>
</html>
